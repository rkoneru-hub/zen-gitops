apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  labels:
    env: dev
    app: monitoring
    managed-by: terraform
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: pharma

  sources:
    # kube-prometheus-stack Helm chart (Grafana + Prometheus + Alertmanager)
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: 84.3.0
      helm:
        valueFiles:
          - $values/k8s/monitoring/prometheus-values.yaml

    # Values file reference for the Helm chart above
    - repoURL: https://github.com/ravdy/zen-gitops.git
      targetRevision: feature/fluent-bit-logging
      ref: values

    # Raw manifests: PodMonitor and any other monitoring resources
    - repoURL: https://github.com/ravdy/zen-gitops.git
      targetRevision: feature/fluent-bit-logging
      path: k8s/monitoring

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10

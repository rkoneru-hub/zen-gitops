apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fluent-bit.name" . }}-config
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "fluent-bit.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Daemon          Off
        Flush           {{ .Values.fluentbit.flush }}
        Log_Level       {{ .Values.fluentbit.logLevel }}
        Parsers_File    parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020
        Health_Check    On

    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        multiline.parser  docker, cri
        DB                {{ .Values.fluentbit.db }}
        Mem_Buf_Limit     {{ .Values.fluentbit.memBufLimit }}
        Skip_Long_Lines   On
        Refresh_Interval  10

    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

    [FILTER]
        Name    grep
        Match   kube.*
        Regex   $kubernetes['namespace_name'] {{ .Values.fluentbit.filterNamespace }}

    [FILTER]
        Name    grep
        Match   kube.*
        Exclude $kubernetes['container_name'] fluent-bit

    [FILTER]
        Name    lua
        Match   kube.*
        script  /fluent-bit/etc/service_index.lua
        call    set_service_index

    [OUTPUT]
        Name                 es
        Match                kube.*
        Host                 {{ .Values.elasticsearch.host }}
        Port                 {{ .Values.elasticsearch.port }}
        TLS                  {{ if .Values.elasticsearch.tls }}On{{ else }}Off{{ end }}
        TLS.Verify           On
        http_api_key         ${ELASTIC_API_KEY}
        Logstash_Format      On
        Logstash_Prefix_Key  _service_name
        Logstash_Prefix      {{ .Values.fluentbit.filterNamespace }}-service
        Logstash_DateFormat  %Y.%m.%d
        Retry_Limit          5
        Suppress_Type_Name   On
        Replace_Dots         On

  parsers.conf: |
    [PARSER]
        Name        docker
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L
        Time_Keep   On

    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z
        Time_Keep   On

    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %d/%b/%Y:%H:%M:%S %z

    [PARSER]
        Name        syslog
        Format      regex
        Regex       ^\<(?<pri>[0-9]+)\>(?<time>[^ ]* {1,2}[^ ]* [^ ]*) (?<host>[^ ]*) (?<ident>[a-zA-Z0-9_\/\.\-]*)(?:\[(?<pid>[0-9]+)\])?(?:[^\:]*\:)? *(?<message>.*)$
        Time_Key    time
        Time_Format %b %d %H:%M:%S

  service_index.lua: |
    function set_service_index(tag, timestamp, record)
        local svc = "{{ .Values.fluentbit.filterNamespace }}-service"

        if record["kubernetes"] ~= nil then
            local labels = record["kubernetes"]["labels"]
            if labels ~= nil and labels["app"] ~= nil then
                svc = labels["app"]
            elseif record["kubernetes"]["pod_name"] ~= nil then
                local stripped = record["kubernetes"]["pod_name"]:match("^(.-)%-[%w]+%-[%w]+$")
                if stripped ~= nil then
                    svc = stripped
                end
            end
        end

        record["_service_name"] = svc
        return 1, timestamp, record
    end
